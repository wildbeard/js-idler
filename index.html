<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, maximum-scale=1" />
    <style>
      body, html {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      .wrapper {
        display: flex;
        flex-wrap: wrap;
        padding: 0 15px;
      }

      #sidebar,
      #rightbar {
        order: 2;
        width: 100%;
      }

      #main {
        order: 1;
        width: 100%;
      }

      .levels {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-gap: 1rem;
      }

      .levels p {
        margin: 0.50rem 0;
      }

      .levels progress {
        width: 100%;
      }

      @media screen and (min-width: 1024px) {
        .levels {
          display: block;
        }
      }

      .available-quests li {
        cursor: pointer;
      }

      .toggle-panel__header {
        position: relative;
        border-bottom: 1px solid black;
      }
      .toggle-panel__header:hover {
        cursor: pointer;
      }

      .toggle-panel__header > div {
        display: flex;
        width: 90%;
        justify-content: space-between;
        align-items: center;
      }

      .toggle-panel__header-title {
        margin: 0.75rem 0;
        font-size: 1.6rem;
      }

      .toggle-panel__header button {
        top: 15px;
        right: 0;
      }

      .quest-panel {
        position: relative;
        margin-top: 1.5rem;
        padding: 15px;
        background-color: white;
        border: 1px solid black;
        border-radius: 0.25rem;
      }

      .minimize-button {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 22px;
        height: 22px;
      }

      .quest-title {
        margin: 0.75rem 0 0.5rem;
        font-size: 1.25rem;
        text-align: center;
      }

      .floating-window {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 450px;
        max-width: 85%;
        padding: 15px;
        background: white;
        border: 1px solid black;
        border-radius: 0.5rem;
        transform: translate(-50%, -50%);
        z-index: 1;
      }

      .floating-window__body {
        min-height: 250px;
        max-height: 450px;
        overflow: scroll;
      }

      .skill-btn {
        min-width: 165px;
        padding: 8px 12px;
        text-align: center;
      }

      .simple-list li {
        margin-bottom: 0.5rem;
      }

      .inventory div {
        display: flex;
        justify-content: space-between;
      }

      @media screen and (min-height: 650px) and (max-height: 1080px) {
        .floating-window__body {
          max-height: 375px;
        }
      }

      @media screen and (min-width: 1024px) {
        .mobile-only {
          display: none;
        }

        #sidebar,
        #rightbar {
          flex: 0 1 25%;
        }

        #sidebar {
          order: 1;
          max-width: 250px;
        }

        #rightbar {
          order: 2;
          max-width: 275px;
        }

        #main {
          display: flex;
          flex: 1 0 50%;
          order: 2;
          justify-content: center;
          margin-top: 15px;
        }

        #main > div {
          width: 50%;
          padding: 0 15px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
